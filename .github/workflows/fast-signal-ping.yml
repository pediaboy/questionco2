name: Fast Signal Ping

# Base44's own workflow scheduler has a hard 5-minute-minimum floor. This GitHub
# Actions job supplements it by hitting the same cron endpoint more often, so the
# auto-signal engine effectively gets evaluated closer to every ~2 minutes instead
# of only every 5. The endpoint is idempotent-safe (checks active-signal/cooldown
# state before firing), so overlapping ticks from both schedulers are harmless.
on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit auto-signal cron endpoint
        # continue-on-error: a single slow/timed-out tick here is harmless -- the
        # endpoint is idempotent-safe and Base44's own 5-minute workflow covers the
        # same ground as a backup. Without this, one occasional slow response (cold
        # start, upstream OKX/ForexFactory latency, etc.) marks the whole job
        # "failed" and spams an email even though nothing is actually broken.
        # (2026-07-25: bumped max-time 40s -> 55s for headroom too, live invokes
        # normally take ~9s but this gives more buffer before we'd time out at all.)
        continue-on-error: true
        run: |
          curl -s -X POST "https://lastquestion.store/api/cron/auto-signal" \
            -H "x-cron-secret: ${{ secrets.SIGNAL_CRON_SECRET }}" \
            --max-time 55 -o /dev/null -w "HTTP %{http_code}\n"
